min_version: "2.1.10"
pre-commit:
  commands:
    web-eslint:
      root: "apps/web/"
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    shared-eslint:
      root: "packages/shared/"
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    mobile-eslint:
      root: "apps/mobile/"
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: npx expo lint -- --fix {staged_files}
      stage_fixed: true
    dashes:
      run: node tools/check-dashes.mjs --files {staged_files}
    copy-register:
      glob: "packages/shared/src/i18n/*.json"
      run: node tools/check-copy.mjs --check
pre-push:
  commands:
    protect-main:
      use_stdin: true
      run: node tools/check-push-target.mjs
