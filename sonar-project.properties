# Analysis surface. Web analyzes app/components/hooks/stores/lib; mobile now mirrors
# that (app/components/hooks/stores/lib + the widget module's cross-platform TS) so
# screens, components, and hooks are analyzed on BOTH platforms, not just web
# (#243 Phase 1). packages/shared is the cross-platform source of truth.
sonar.sources=apps/web/app/,apps/web/components/,apps/web/hooks/,apps/web/stores/,apps/web/lib/,apps/mobile/app/,apps/mobile/components/,apps/mobile/hooks/,apps/mobile/stores/,apps/mobile/lib/,apps/mobile/modules/orbit-widget/src/,packages/shared/src/
sonar.tests=apps/web/__tests__/,apps/mobile/__tests__/,packages/shared/src/__tests__/
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Hard-excluded from analysis entirely: build output, native platform dirs, generated
# resources, test doubles, and scaffolding configs that carry no product logic.
# packages/shared/src/types/__generated__/** is orval's zod output (npm run generate:zod,
# header "Do not edit manually") — generated code is exempt from quality analysis; any
# fix here would be reverted on the next regen, so exclude the artifact, not hand-edit it.
sonar.exclusions=**/node_modules/**,.next/**,.expo/**,.turbo/**,dist/**,apps/mobile/test-mocks/**,apps/mobile/scripts/**,apps/mobile/index.js,apps/mobile/metro.config.js,apps/mobile/tailwind.config.js,apps/mobile/modules/**/android/build/**,apps/mobile/modules/**/android/.gradle/**,apps/mobile/modules/**/android/generated/**,apps/mobile/modules/**/android/src/main/**,apps/mobile/modules/**/ios/**,packages/shared/src/types/__generated__/**

# Coverage exclusions — genuinely untestable code only (#446 + #243). The mobile
# vitest harness runs in a `node` environment and unit-tests EXTRACTED logic (hooks,
# stores, lib, *-model.ts) rather than rendering every RN screen; `apps/mobile/vitest.config.ts`
# `coverage.include` now instruments the full app/components/hooks/stores/lib surface so
# every tested screen/component/hook lands in lcov (previously only lib/stores were, which
# scored the rest 0% in SonarCloud). This exclusion list mirrors that config's `exclude`:
# it removes ONLY presentational/glue files that carry no unit-testable logic, never a
# blanket apps/mobile/** wildcard. offline-queue.ts + auth-store.ts were REMOVED from this
# list — they are now instrumented and well-covered (their reducer/JWT logic counts).
# Groups:
#   web/shared bootstrap — Next.js layouts (font/provider/theme), BFF route handlers
#     (httpOnly-cookie/session glue, no mobile analog), the shared pill-geometry token table.
#   mobile categorical globs — *.styles.ts / *-styles.ts / styles.ts (style token tables),
#     app/**/_layout.tsx (Expo Router nav shells), modules/** (native Android widget bridge).
#   mobile bootstrap glue — providers.tsx / theme-provider.tsx / use-app-theme.ts / supabase.ts /
#     sentry-init.ts / plural.ts (app-entry wiring, RN-coupled singletons, re-export barrels),
#     orbit-widget.ts (requireNativeModule bridge), version-gate-store.ts (thin binding),
#     preferences-labels.ts (static option data), celebration-motion.ts (motion tokens),
#     use-app-toast/use-date-format/use-habit-visibility/use-horizontal-swipe/use-undo-toast
#     (thin store-selector / gesture-worklet glue).
#   mobile presentational JSX (enumerated) — pure-layout RN screens/sections/components with no
#     extractable logic and no render test (their behavior lives in tested shared helpers/models):
#     onboarding/gamification/tour/social/challenges/wrapped/goal+habit modal JSX, ui pickers &
#     animations, legal/marketing screens. Enumerated (not globbed) so the ~178 component/screen
#     files that ARE render-tested keep counting.
#   web presentational/glue (#243 coverage pass 2) — apps/web/vitest.config.ts now mirrors sonar.sources
#     via coverage.include (closing the same instrument gap #508 closed for mobile), which surfaced
#     web files no test imports as 0%. Enumerated here are ONLY the genuinely-untestable ones: Next
#     route/error/not-found shells (auth-callback OAuth-effect glue, about/privacy/terms/delete-account
#     static legal copy, r/[code] redirect route, challenges/[id] + public-profile + onboarding route
#     shells composing separately-tested children), motion/nav glue (route-transition-shell, the
#     effect-only navigation-history-tracker returning null, web-nav prop-spread wrapper), the desktop
#     astra-copilot-rail chrome (re-uses the tested useChatComposer/chat components), calendar-week-view
#     layout composition, and style/binding primitives (mono-toggle, parent-ring, retained-onboarding
#     overlay, habit-tag-chip, version-gate-store). The 12 borderline web files WITH real logic
#     (bottom-tab-bar, social-entry-card, invite-hero, pair-detail, wrapped, tour-*, milestone-share-card,
#     habit-row-menu, public-profile-view) are TESTED, not excluded.
sonar.coverage.exclusions=apps/web/app/**/layout.tsx,apps/web/app/api/**,packages/shared/src/theme/button.ts,apps/mobile/app/**/_layout.tsx,apps/mobile/**/*.styles.ts,apps/mobile/**/*-styles.ts,apps/mobile/**/styles.ts,apps/mobile/modules/**,apps/mobile/app/(onboarding)/index.tsx,apps/mobile/app/(tabs)/calendar/_components/calendar-day-entry.tsx,apps/mobile/app/(tabs)/calendar/_components/calendar-grid.tsx,apps/mobile/app/(tabs)/today-shell.tsx,apps/mobile/app/+not-found.tsx,apps/mobile/app/about.tsx,apps/mobile/app/accountability-pair.tsx,apps/mobile/app/advanced-sections.tsx,apps/mobile/app/advanced.tsx,apps/mobile/app/ai-settings.tsx,apps/mobile/app/auth-callback.tsx,apps/mobile/app/chat.tsx,apps/mobile/app/code-step.tsx,apps/mobile/app/email-step.tsx,apps/mobile/app/login-atoms.tsx,apps/mobile/app/login.tsx,apps/mobile/app/preferences-labels.ts,apps/mobile/app/preferences-sections.tsx,apps/mobile/app/preferences.tsx,apps/mobile/app/privacy.tsx,apps/mobile/app/r/[code].tsx,apps/mobile/app/retrospective-empty-state.tsx,apps/mobile/app/retrospective-no-data-state.tsx,apps/mobile/app/social.tsx,apps/mobile/app/social/_components/add-friend-form.tsx,apps/mobile/app/social/_components/buddy-invite-row.tsx,apps/mobile/app/social/_components/buddy-row.tsx,apps/mobile/app/social/_components/challenges-entry-card.tsx,apps/mobile/app/social/_components/cheer-composer.tsx,apps/mobile/app/social/_components/friend-request-row.tsx,apps/mobile/app/social/_components/invite-hero.tsx,apps/mobile/app/social/_components/social-opt-in-gate.tsx,apps/mobile/app/social/challenges/[id].tsx,apps/mobile/app/social/challenges/_components/challenge-card.tsx,apps/mobile/app/social/challenges/_components/habit-picker.tsx,apps/mobile/app/social/challenges/_components/invite-friends-picker.tsx,apps/mobile/app/social/challenges/_components/share-join-code.tsx,apps/mobile/app/streak-sections-freeze.tsx,apps/mobile/app/streak-sections.tsx,apps/mobile/app/streak.tsx,apps/mobile/app/terms.tsx,apps/