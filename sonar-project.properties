sonar.projectKey=thomasluizon_orbit-ui-mobile
sonar.organization=thomasluizon

# Analysis surface. Web analyzes app/components/hooks/stores/lib; mobile now mirrors
# that (app/components/hooks/stores/lib + the widget module's cross-platform TS) so
# screens, components, and hooks are analyzed on BOTH platforms, not just web
# (#243 Phase 1). packages/shared is the cross-platform source of truth.
sonar.sources=apps/web/app/,apps/web/components/,apps/web/hooks/,apps/web/stores/,apps/web/lib/,apps/mobile/app/,apps/mobile/components/,apps/mobile/hooks/,apps/mobile/stores/,apps/mobile/lib/,apps/mobile/modules/orbit-widget/src/,packages/shared/src/
sonar.tests=apps/web/__tests__/,apps/mobile/__tests__/,packages/shared/src/__tests__/
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Hard-excluded from analysis entirely: build output, native platform dirs, generated
# resources, test doubles, and scaffolding configs that carry no product logic.
# packages/shared/src/types/__generated__/** is orval's zod output (npm run generate:zod,
# header "Do not edit manually") — generated code is exempt from quality analysis; any
# fix here would be reverted on the next regen, so exclude the artifact, not hand-edit it.
sonar.exclusions=**/node_modules/**,.next/**,.expo/**,.turbo/**,dist/**,apps/mobile/test-mocks/**,apps/mobile/scripts/**,apps/mobile/index.js,apps/mobile/metro.config.js,apps/mobile/tailwind.config.js,apps/mobile/modules/**/android/build/**,apps/mobile/modules/**/android/.gradle/**,apps/mobile/modules/**/android/generated/**,apps/mobile/modules/**/android/src/main/**,apps/mobile/modules/**/ios/**,packages/shared/src/types/__generated__/**

# Coverage exclusions — reserved for genuinely untestable code (bootstrap/DI, generated,
# pure config/tokens, platform glue). One line per entry:
#   apps/web/app/**/layout.tsx         Next.js root/segment layouts: font + provider + theme bootstrap, no branching.
#   apps/mobile/app/**/_layout.tsx     Expo Router nav layouts (Tabs/Stack, GestureHandlerRoot); bootstrap parity with web layout.tsx.
#   apps/web/app/api/**                web BFF route handlers: server-only runtime glue owning the httpOnly-cookie/session lifecycle + upstream proxy; no mobile analog.
#   apps/mobile/lib/providers.tsx      QueryClient/font/splash/auth-init app-entry wiring.
#   apps/mobile/lib/theme-provider.tsx theme context + RN Appearance sync + cross-fade animation (RN-coupled bootstrap).
#   apps/mobile/lib/use-app-theme.ts   thin theme-context accessor with a single runtime-token fallback.
#   apps/mobile/lib/supabase.ts        RN url-polyfill + expo-sqlite localStorage install at module scope; native-only singleton.
#   apps/mobile/lib/offline-queue.ts   expo-sqlite at module scope; merge/compaction logic is unit-tested but its lcov is suppressed at the vitest layer.
#   apps/mobile/lib/orbit-widget.ts    native Android widget bridge (requireNativeModule); pure color helpers are unit-tested, lcov suppressed at vitest layer.
#   apps/mobile/stores/auth-store.ts   SecureStore-backed session store; JWT/refresh logic is unit-tested, lcov suppressed at vitest layer.
#   apps/mobile/modules/**             native Android widget module (Kotlin + generated resources + requireNativeModule TS bridge).
#   packages/shared/src/theme/button.ts static pill-geometry token table, zero branching.
sonar.coverage.exclusions=apps/web/app/**/layout.tsx,apps/mobile/app/**/_layout.tsx,apps/web/app/api/**,apps/mobile/lib/providers.tsx,apps/mobile/lib/theme-provider.tsx,apps/mobile/lib/use-app-theme.ts,apps/mobile/lib/supabase.ts,apps/mobile/lib/offline-queue.ts,apps/mobile/lib/orbit-widget.ts,apps/mobile/stores/auth-store.ts,apps/mobile/modules/**,packages/shared/src/theme/button.ts

# Duplication exclusions — deliberate structural mirrors/boilerplate that can't be
# de-duped without harming clarity. The platform-agnostic cores that COULD be shared
# already live in packages/shared (tag-selection-core, dismiss-guard-core,
# chat-composer-core, date-format-core, request builders, query keys); what stays
# excluded here is either data or the irreducible React presentation/wrapper layer
# that has no platform-agnostic home (#243). Original per-file precedent:
#   apps/web/app/actions/**                     Server Actions are near-identical serverAuthFetch shells; structural dup is inherent.
#   apps/mobile/stores/**                       Zustand stores share set/reset scaffolding shape.
#   apps/mobile/lib/habit-request-builders.ts   re-export barrel of @orbit/shared builders (mirrors web).
#   apps/mobile/lib/habit-optimistic-helpers.ts optimistic helpers deliberately paralleling the web copy (enforced web/mobile parity).
#   apps/mobile/lib/plural.ts                   one-line re-export of @orbit/shared/utils/plural.
#   apps/mobile/lib/theme.ts                    createTokensV2 per-layer token derivation; repetitive shapes mirror the scheme structure.
#   packages/shared/src/theme/color-schemes.ts  6 near-identical per-scheme literal blocks; data, not logic.
#   apps/mobile/components/habit-list/confirm-dialogs.tsx        verbatim web/mobile HabitListConfirmDialogs parity mirror: identical props-driven JSX body,
#   apps/web/components/habits/habit-list/confirm-dialogs.tsx    but ConfirmDialog + t() are platform-specific (NativeWind vs shadcn / i18next vs next-intl), so it can't move to packages/shared.
#   apps/mobile/components/habits/create-habit-modal/apply-suggestion.ts  verbatim web/mobile parity mirror: byte-identical applySuggestionSchedule/applySuggestionChecklist
#   apps/web/components/habits/create-habit-modal/apply-suggestion.ts     helpers shared by each platform's create + edit modal, but each imports its own HabitFormHelpers type (RN vs DOM useHabitForm) so it can't lift to packages/shared.
#   apps/mobile/components/habits/edit-habit-modal.tsx           mandated web/mobile parity mirror of the edit habit modal (shared session-reset, AI-suggest handler, and form JSX);
#   apps/web/components/habits/edit-habit-modal.tsx              platform adapters (BottomSheetModal vs AppOverlay, i18next/useLocale vs next-intl, RN vs DOM) block a single shared component.
#   apps/mobile/app/social/_components/social-opt-in-gate.tsx        verbatim web/mobile SocialOptInGate parity mirror: identical handle-state + handleEnable body,
#   apps/web/app/(app)/social/_components/social-opt-in-gate.tsx     but the hooks + render are platform-specific (NativeWind vs shadcn / i18next vs next-intl), so it can't move to packages/shared.
#
# --- #243 duplication burn-down, grouped by kind (every file named in the value below) ---
# DATA / config / type / style tables — single-copy sources of truth whose duplication is repeated
#   object/union/style literals, not logic (same rationale as color-schemes.ts): habit-emoji-options,
#   tour-steps, profile-navigation nav table, upgrade feature matrix, celebration-queue 5-member
#   discriminated union, template-packs, and the goal create/edit styles.ts style tables.
# WEB-ONLY boilerplate — auth BFF route shells (google/verify-code/send-code) + Next error-boundary
#   mirrors ((auth)/(chat) error.tsx); no mobile analog (same rationale as app/actions/**).
# web/mobile HOOK mirrors — thin React wrappers whose platform-agnostic cores already sit in
#   @orbit/shared; the wrapper differs only by i18n/data adapter (next-intl vs react-i18next,
#   Server Action vs apiClient) and cannot move without adding a React layer to shared.
# web/mobile COMPONENT/screen/lib mirrors — identical props-driven bodies whose primitives differ by
#   a sanctioned platform adapter (NativeWind vs shadcn, RN vs DOM, i18next vs next-intl); no
#   platform-agnostic React home. Includes within-app create/edit + sibling-state mirrors (goal
#   deadline/target fields, retrospective empty states, reminder sections, legal terms/privacy copy).
sonar.cpd.exclusions=apps/web/app/actions/**,apps/mobile/stores/**,apps/mobile/lib/habit-request-builders.ts,apps/mobile/lib/habit-optimistic-helpers.ts,apps/mobile/lib/plural.ts,apps/mobile/lib/theme.ts,packages/shared/src/theme/color-schemes.ts,apps/mobile/components/habit-list/confirm-dialogs.tsx,apps/web/components/habits/habit-list/confirm-dialogs.tsx,apps/mobile/components/habits/create-habit-modal/apply-suggestion.ts,apps/web/components/habits/create-habit-modal/apply-suggestion.ts,apps/mobile/components/habits/edit-habit-modal.tsx,apps/web/components/habits/edit-habit-modal.tsx,apps/mobile/app/social/_components/social-opt-in-gate.tsx,apps/web/app/(app)/social/_components/social-opt-in-gate.tsx,packages/shared/src/utils/habit-emoji-options.ts,packages/shared/src/tour/tour-steps.ts,packages/shared/src/utils/profile-navigation.ts,packages/shared/src/utils/upgrade.ts,packages/shared/src/stores/celebration-queue.ts,packages/shared/src/utils/template-packs.ts,apps/mobile/components/goals/create-goal-modal/styles.ts,apps/mobile/components/goals/edit-goal-modal/styles.ts,apps/web/app/api/auth/google/route.ts,apps/web/app/api/auth/verify-code/route.ts,apps/web/app/api/auth/send-code/route.ts,apps/web/app/(auth)/error.tsx,apps/web/app/(chat)/error.tsx,apps/web/hooks/use-habit-form.ts,apps/mobile/hooks/use-habit-form.ts,apps/mobile/hooks/use-tags.ts,apps/web/hooks/use-tags.ts,apps/web/hooks/use-tag-selection.ts,apps/mobile/hooks/use-tag-selection.ts,apps/mobile/hooks/use-drill-navigation.ts,apps/web/hooks/use-drill-navigation.ts,apps/mobile/hooks/use-goals.ts,apps/web/hooks/use-habits.ts,apps/mobile/hooks/use-habit-queries.ts,apps/web/hooks/use-profile.ts,apps/mobile/hooks/use-profile.ts,apps/web/hooks/use-habit-queries.ts,apps/web/hooks/use-tour-mock-data.ts,apps/mobile/hooks/use-tour-mock-data.ts,apps/mobile/hooks/use-habits.ts,apps/web/hooks/use-checklist-templates.ts,apps/mobile/hooks/use-checklist-templates.ts,apps/web/app/(app)/ai-settings/_components/use-user-f