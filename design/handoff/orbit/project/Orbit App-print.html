<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orbit — Print</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { font-family: var(--font-sans); color: #14141a; }
  @keyframes orbit-bulk-in { from { opacity: 1; } to { opacity: 1; } }
  @keyframes orbit-rotate { from { transform: rotate(0deg); } to { transform: rotate(0deg); } }
  .scheme-purple, .scheme-blue, .scheme-rose, .scheme-green, .scheme-orange, .scheme-cyan { scrollbar-width: none; }
  .scheme-purple ::-webkit-scrollbar,
  .scheme-blue ::-webkit-scrollbar,
  .scheme-rose ::-webkit-scrollbar,
  .scheme-green ::-webkit-scrollbar,
  .scheme-orange ::-webkit-scrollbar,
  .scheme-cyan ::-webkit-scrollbar { display: none; }

  .print-page {
    page-break-after: always;
    break-after: page;
    padding: 32px 36px 40px;
    box-sizing: border-box;
    width: 100%;
    min-height: 100vh;
  }
  .print-page:last-child { page-break-after: auto; break-after: auto; }
  .print-page h1 {
    font-family: var(--font-sans);
    font-size: 28px; font-weight: 600;
    letter-spacing: -0.02em; margin: 0 0 4px;
    color: #14141a;
  }
  .print-page .sub {
    font-family: var(--font-sans);
    font-size: 14px; color: #5a5a66;
    line-height: 1.5; margin-bottom: 22px;
    font-style: italic;
  }
  .print-page hr {
    border: 0; border-top: 1px solid #e4e2dd; margin: 0 0 22px;
  }
  .print-grid {
    display: grid; gap: 18px 18px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    align-items: start;
  }
  .print-card {
    display: flex; flex-direction: column; gap: 8px;
    break-inside: avoid;
  }
  .print-card .label {
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    color: #5a5a66; letter-spacing: 0.02em;
  }
  /* Each scaled phone sits in a sized box so the page layout is predictable */
  .phone-scale {
    width: 100%;
    aspect-ratio: 412 / 892;
    overflow: hidden;
    position: relative;
    border-radius: 14px;
  }
  .phone-scale > .phone-inner {
    position: absolute; top: 0; left: 0;
    transform-origin: top left;
  }

  @page { size: A3 landscape; margin: 14mm; }
  @media print {
    html, body { background: #ffffff; }
    .print-page { min-height: 0; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel">
function PhoneCard({ label, children }) {
  const wrapRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useLayoutEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const measure = () => {
      const w = el.clientWidth;
      if (w > 0) setScale(w / 412);
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div className="print-card">
      <div ref={wrapRef} className="phone-scale">
        <div className="phone-inner" style={{
          transform: `scale(${scale})`,
          width: 412, height: 892,
        }}>{children}</div>
      </div>
      <div className="label">{label}</div>
    </div>
  );
}

function Page({ title, subtitle, children }) {
  return (
    <section className="print-page">
      <h1>{title}</h1>
      {subtitle && <div className="sub">{subtitle}</div>}
      <hr />
      <div className="print-grid">{children}</div>
    </section>
  );
}

      <Page title="Chat · the headline feature" subtitle="Astra is Orbit's primary interaction model. Conversation, embedded cards, voice, action chips.">

        {P("b · Loading", <TodayB />)}
        {P("c · Empty · Tell Astra", <TodayC />)}
        {P("d · Active search", <TodayD />)}
        {P("e · Select mode + bulk", <TodayE />)}
        {P("f · Filtered Weekly+Work", <TodayF />)}
        {P("g · AI summary (Pro)", <TodayG />)}
        {P("g · AI summary upgrade (free)", <TodayGFree />)}
        {P("g · End-of-day Reflect prompt", <TodayReflect />)}
        {P("AI summary block close-up", <AISummaryCloseup />)}

      </Page>

      <Page title="Upgrade to Pro">
        {P("Upgrade · yearly", <UpgradeScreen />)}

      <Page title="Confirm dialogs">

}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PrintApp />);

// Auto-print once fonts + React + lucide have settled
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  // Wait for React + Babel to finish mounting all phones
  await new Promise(r => setTimeout(r, 2500));
  // Ensure lucide icons are rendered
  if (window.lucide?.createIcons) window.lucide.createIcons();
  await new Promise(r => setTimeout(r, 600));
  window.print();
})();
</script>

</body>
</html>
