name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, code quality, security, and compliance with CLAUDE.md / AGENTS.md.

            Pay special attention to:
            - Cross-platform parity: any change touching apps/web must also touch apps/mobile (and vice versa). Flag missing parity explicitly.
            - Hardcoded user-facing strings (must go through i18n).
            - Use of `any` (banned) and `console.log` in production code (banned).
            - Type imports from `@orbit/shared/types` and query keys from `@orbit/shared/query`.

            The PR branch is already checked out in the current working directory.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to post inline review comments on specific lines for any issues you find.
            Use `gh pr comment` for an overall summary at the end. Keep the summary brief.
            Only post GitHub comments — do not submit review text as a chat message.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
