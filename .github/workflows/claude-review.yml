name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the SOLE automated reviewer of this PR. You MUST finish with exactly ONE decisive GitHub review — APPROVE or REQUEST_CHANGES. A bare comment is never an acceptable terminal state.

            ## Single-turn execution — this runtime has NO background wake-ups

            This GitHub Action runs you for a single execution. It does NOT deliver a notification when a forked skill or a background subagent finishes — if you end your turn waiting to be "notified when it completes", the job simply exits and the review is never posted. Therefore: run everything to completion in this one run. When `/pr-review` fans out its subagents (parity-checker, i18n-syncer, …), block on their results in-turn; never fire-and-forget and yield. Do NOT end your turn while any subagent, forked skill, or background task is still pending — block on it, or run its check inline. You are not done until `gh pr review … --approve` or `--request-changes` has actually been called.

            ## Step 1 — Review via the /pr-review skill (single source of truth)

            Run the repo's `/pr-review` skill against PR #${{ github.event.pull_request.number }}. The skill walks `.claude/skills/pr-review/rubric.md` and produces a severity-ranked report. This workflow does NOT maintain its own rubric — the skill and rubric own all criteria. You only run the skill and post the decision.

            Honor the rubric's **Signal gate**: surface high-signal only — Critical / High / concretely-actionable Medium. Do NOT add nits, style preferences, naming bikeshed, reformatting, or "consider…/future-proof…" suggestions of your own. Manufacturing nits to avoid approving is a defect.

            ## CI adaptations

            - Skip the skill's Phase 6 (/validate): this PR already runs Build / Unit Tests / SonarCloud as separate required checks.
            - The sibling `orbit-api` repo is NOT checked out in this job. Any cross-repo dimension (contract-aligner, the orbit-api side of the backward-compat guard) that needs it → mark "not verifiable in CI", never guess.
            - Skip the skill's own Phase 7 posting — YOU post the single decision in Step 2.
            - First read prior resolved threads and your own earlier reviews; never re-flag a resolved or already-addressed concern, and focus on the diff since your last review.

            ## Step 2 — Post exactly one decision (mandatory)

            From the skill's surviving findings, the recommendation is deterministic:

            - **ANY Critical or High finding** (including any `⚠️ breaks old mobile clients`) → request changes:
              gh pr review ${{ github.event.pull_request.number }} --request-changes --body-file <skill report path>
            - **Otherwise** → approve:
              gh pr review ${{ github.event.pull_request.number }} --approve --body-file <skill report path>

            Medium / Low / Info findings ride along in the report body but NEVER downgrade an APPROVE. Default to APPROVE — a clean PR earns a plain approval, say so. Never manufacture a Critical/High finding to avoid approving. Add inline comments (mcp__github_inline_comment__create_inline_comment, confirmed: true) only for Critical/High items tied to a specific line.

            ## Tool discipline (permissions are prefix-matched)

            Every Bash call MUST be a single plain command exactly matching an allowed prefix — no `cd X && ...`, no pipes, no subshells, no heredocs wrapping the command. Write the report with the Write tool to a file under /tmp, then post it with the standalone command `gh pr review <N> --approve --body-file /tmp/<file>` (or --request-changes). If a tool call is denied, do not retry variants of the same shape — simplify to a plain allowed command.

            The PR branch is checked out in the current working directory.
          show_full_output: true
          claude_args: '--allowedTools "Skill,Task,Read,Grep,Glob,Write,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git status:*),Bash(git merge-base:*),Bash(git fetch:*),Bash(git branch:*),Bash(ls:*)"'
