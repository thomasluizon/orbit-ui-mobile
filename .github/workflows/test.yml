name: PR Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npm run build

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Run tests with coverage thresholds
        run: npx turbo run test -- --coverage

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npx turbo run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npx turbo run lint

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fail on critical production CVEs
        run: npm audit --omit=dev --audit-level=critical

      - name: Report high and moderate advisories (non-blocking)
        if: always()
        run: npm audit --audit-level=moderate || true

  design-guard:
    name: Design Token Guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Ban raw --slate-*, transition-all, h-screen in app code
        run: |
          # DESIGN.md bans semantic-token violations. Accent-color literals are caught at
          # edit time by the forbid-hardcoded-brand-color hook; this gate covers hand edits.
          hits=$(grep -rnE '\-\-slate-|transition-all|\bh-screen\b' apps/web apps/mobile \
            --include='*.ts' --include='*.tsx' --include='*.css' \
            --exclude-dir=node_modules --exclude-dir=__tests__ \
            --exclude='globals.css' --exclude='theme.ts' \
            --exclude='*.test.ts' --exclude='*.test.tsx' --exclude='*.spec.ts' --exclude='*.spec.tsx' || true)
          if [ -n "$hits" ]; then
            echo "::error::DESIGN.md ban: use semantic tokens (var(--fg-*)/var(--primary)), transform+opacity transitions, and min-h-dvh."
            echo "$hits"
            exit 1
          fi
          echo "Design token guard passed."

  harness-hooks:
    name: Harness Hook Parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # The suite stopped being zero-dependency when the visual completion oracle
      # landed: tools/visual-signature.mjs requires the TypeScript compiler API to
      # build its render-affecting AST fingerprint, and check-surface-coverage.mjs
      # imports it. Without this the import throws and EVERY surface-gate and oracle
      # assertion fails with exit 1 - which is exactly what happened from the moment
      # the rebuild landed. Installing only `typescript` keeps the job at seconds
      # rather than a full `npm ci`, and the version is pinned to the root manifest.
      - name: Install the one non-builtin the suite needs
        run: npm install --no-save --no-audit --no-fund typescript@^6.0.2

      - name: Prove the hook rules, the real hooks, and the opencode plugin agree
        # Carries the agent-frontmatter guard: `tools: Bash(gh:*)` fails OPEN (the
        # specifier is stripped and the agent gets a full shell), which no linter
        # catches. orbit-api's agents are not checked out here, so this job covers the
        # UI repo's agents only; the local run covers both.
        run: node .claude/hooks/test-hooks.mjs

      - name: Work-order ledger freshness
        # The committed .claude/workorders/ ledger is generated, and until now
        # nothing failed when it was hand-edited or left stale after a manifest
        # or suppression change. Regeneration is idempotent (verified: two
        # consecutive runs produce a byte-identical tree), so ANY drift from
        # HEAD after regenerating means the ledger no longer matches its inputs.
        # `git add -N` plus diffing against HEAD is deliberate: it catches all
        # three drift shapes (a modified order, a DELETED one - the fold case -
        # and a NEW one), where a plain index diff goes blind on deletions the
        # moment they are staged. Timeline appends survive regeneration, so
        # committing the regenerated output loses nothing.
        run: |
          node tools/workorder.mjs
          git add -N .claude/workorders/
          if ! git diff --exit-code HEAD -- .claude/workorders/; then
            echo "::error::.claude/workorders/ is stale or hand-edited: regenerating it changed the tree. Run 'node tools/workorder.mjs' and commit the result; never edit a work order by hand."
            exit 1
          fi
          echo "Work-order ledger is fresh: regeneration was a no-op."

  contract-drift:
    name: Contract Drift
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Regenerate Zod contract snapshot from orbit-api main
        run: npm run generate:zod -w @orbit/shared

      - name: Fail if the API contract drifted from the committed snapshot
        run: |
          if ! git diff --quiet -- packages/shared/src/types/__generated__/api.generated.ts; then
            echo "::error::API contract drift: orbit-api's OpenAPI spec changed since the committed Zod snapshot was last regenerated. Review the orbit-api change, hand-update packages/shared/src/types/* if the contract you consume changed, then run 'npm run generate:zod -w @orbit/shared' and commit the updated api.generated.ts to re-baseline. See packages/shared/CONTRACT_DRIFT.md."
            git diff -- packages/shared/src/types/__generated__/api.generated.ts
            exit 1
          fi
          echo "No contract drift: committed snapshot matches orbit-api main."
