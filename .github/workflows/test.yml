name: PR Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npm run build

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Run tests with coverage thresholds
        run: npx turbo run test -- --coverage

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npx turbo run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - run: npx turbo run lint

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fail on critical production CVEs
        run: npm audit --omit=dev --audit-level=critical

      - name: Report high and moderate advisories (non-blocking)
        if: always()
        run: npm audit --audit-level=moderate || true

  design-guard:
    name: Design Token Guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Ban raw --slate-*, transition-all, h-screen in app code
        run: |
          # DESIGN.md bans semantic-token violations. Accent-color literals are caught at
          # edit time by the forbid-hardcoded-brand-color hook; this gate covers hand edits.
          hits=$(grep -rnE '\-\-slate-|transition-all|\bh-screen\b' apps/web apps/mobile \
            --include='*.ts' --include='*.tsx' --include='*.css' \
            --exclude-dir=node_modules --exclude-dir=__tests__ \
            --exclude='globals.css' --exclude='theme.ts' \
            --exclude='*.test.ts' --exclude='*.test.tsx' --exclude='*.spec.ts' --exclude='*.spec.tsx' || true)
          if [ -n "$hits" ]; then
            echo "::error::DESIGN.md ban: use semantic tokens (var(--fg-*)/var(--primary)), transform+opacity transitions, and min-h-dvh."
            echo "$hits"
            exit 1
          fi
          echo "Design token guard passed."

  contract-drift:
    name: Contract Drift
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Regenerate Zod contract snapshot from orbit-api main
        run: npm run generate:zod -w @orbit/shared

      - name: Fail if the API contract drifted from the committed snapshot
        run: |
          if ! git diff --quiet -- packages/shared/src/types/__generated__/api.generated.ts; then
            echo "::error::API contract drift: orbit-api's OpenAPI spec changed since the committed Zod snapshot was last regenerated. Review the orbit-api change, hand-update packages/shared/src/types/* if the contract you consume changed, then run 'npm run generate:zod -w @orbit/shared' and commit the updated api.generated.ts to re-baseline. See packages/shared/CONTRACT_DRIFT.md."
            git diff -- packages/shared/src/types/__generated__/api.generated.ts
            exit 1
          fi
          echo "No contract drift: committed snapshot matches orbit-api main."
