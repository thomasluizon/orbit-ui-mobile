name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Tests with Coverage
        run: npx turbo run test -- --coverage

      - name: Merge Coverage Reports
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const reports = [
            { file: 'coverage/web/lcov.info', prefix: 'apps/web' },
            { file: 'coverage/mobile/lcov.info', prefix: 'apps/mobile' },
            { file: 'coverage/shared/lcov.info', prefix: 'packages/shared' },
          ]

          const outputPath = path.join('coverage', 'lcov.info')
          fs.mkdirSync(path.dirname(outputPath), { recursive: true })

          const merged = []

          for (const report of reports) {
            if (!fs.existsSync(report.file)) continue

            const content = fs.readFileSync(report.file, 'utf8')
            const lines = content.split(/\r?\n/)

            for (const line of lines) {
              if (!line.startsWith('SF:')) {
                merged.push(line)
                continue
              }

              const sourceFile = line.slice(3).replace(/\\/g, '/')
              const normalized = sourceFile.startsWith(report.prefix)
                ? sourceFile
                : `${report.prefix}/${sourceFile}`

              merged.push(`SF:${normalized}`)
            }
          }

          fs.writeFileSync(outputPath, merged.join('\n'))
          NODE

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
