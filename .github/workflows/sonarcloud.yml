name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Tests with Coverage
        run: npx turbo run test -- --coverage

      - name: Merge Coverage Reports
        run: |
          mkdir -p coverage
          # Use the web coverage as primary (it has the most source)
          if [ -f coverage/web/lcov.info ]; then
            cp coverage/web/lcov.info coverage/lcov.info
          fi
          # Append shared coverage if it exists
          if [ -f coverage/shared/lcov.info ]; then
            cat coverage/shared/lcov.info >> coverage/lcov.info
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
