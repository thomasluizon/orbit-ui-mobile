name: Android Release

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: User-facing app version shown on Google Play
        required: true
        type: string
      android_version_code:
        description: Android versionCode for this upload
        required: true
        type: string
      track:
        description: Google Play release track
        required: true
        type: choice
        options:
          - internal
          - closed
          - open
          - production
      clear_cache:
        description: Clear Gradle cache before building
        required: false
        type: boolean
        default: false
      validate_expo_dependencies:
        description: Run Expo dependency compatibility check before building
        required: false
        type: boolean
        default: false
      message:
        description: Optional build message shown in Expo
        required: false
        type: string

jobs:
  release-android:
    name: Build and publish Android app
    runs-on: ubuntu-latest
    env:
      RELEASE_WORKDIR: ${{ github.workspace }}/.release-mobile
      PROD_ADMOB_ANDROID_APP_ID: ca-app-pub-8521676951882691~5595921738
      PROD_ADMOB_ANDROID_INTERSTITIAL_ID: ca-app-pub-8521676951882691/8083010939
      PROD_ADMOB_ANDROID_REWARDED_ID: ca-app-pub-8521676951882691/3704782221

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package.json
            packages/shared/package.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate release secrets
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          REQUIRED_SECRETS=(
            "EXPO_TOKEN"
            "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            "GOOGLE_SERVICES_JSON"
            "ANDROID_KEYSTORE_BASE64"
            "ANDROID_KEYSTORE_PASSWORD"
            "ANDROID_KEY_ALIAS"
            "ANDROID_KEY_PASSWORD"
          )

          for secret_name in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Prepare isolated mobile release workspace
        shell: bash
        run: |
          set -euo pipefail
          node apps/mobile/scripts/prepare-release-workspace.js "${RELEASE_WORKDIR}"

      - name: Install isolated mobile dependencies
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        run: npm install --package-lock=false --prefer-offline --no-audit --fund=false

      - name: Validate Expo dependency compatibility
        if: ${{ inputs.validate_expo_dependencies }}
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        run: npx expo install --check

      - name: Set Expo app version
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
        run: |
          set -euo pipefail
          node scripts/set-app-version.js "${APP_VERSION}" "${ANDROID_VERSION_CODE}"

      - name: Write Firebase Google services config
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Write Google Play service account key
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > play-service-account.json
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Validate Expo config resolves production AdMob IDs
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EAS_BUILD_PROFILE: production
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: "false"
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ env.PROD_ADMOB_ANDROID_APP_ID }}
          EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_ID: ${{ env.PROD_ADMOB_ANDROID_INTERSTITIAL_ID }}
          EXPO_PUBLIC_ADMOB_ANDROID_REWARDED_ID: ${{ env.PROD_ADMOB_ANDROID_REWARDED_ID }}
          PROD_ADMOB_ANDROID_APP_ID: ${{ env.PROD_ADMOB_ANDROID_APP_ID }}
          PROD_ADMOB_ANDROID_INTERSTITIAL_ID: ${{ env.PROD_ADMOB_ANDROID_INTERSTITIAL_ID }}
          PROD_ADMOB_ANDROID_REWARDED_ID: ${{ env.PROD_ADMOB_ANDROID_REWARDED_ID }}
        run: |
          set -euo pipefail

          npx expo config --type public --json > expo-public-config.json

          node <<'NODE'
          const fs = require('node:fs')

          const SAMPLE_IDS = [
            'ca-app-pub-3940256099942544~3347511713',
            'ca-app-pub-3940256099942544/1033173712',
            'ca-app-pub-3940256099942544/5224354917',
          ]

          const config = JSON.parse(fs.readFileSync('expo-public-config.json', 'utf8'))
          const extra = config.extra ?? config.expo?.extra ?? {}
          const adMob = extra.adMob ?? {}

          if (adMob.useTestIds !== false) {
            throw new Error(`Expected extra.adMob.useTestIds=false, got ${String(adMob.useTestIds)}`)
          }

          const expected = {
            androidAppId: process.env.PROD_ADMOB_ANDROID_APP_ID,
            androidInterstitialId: process.env.PROD_ADMOB_ANDROID_INTERSTITIAL_ID,
            androidRewardedId: process.env.PROD_ADMOB_ANDROID_REWARDED_ID,
          }

          for (const [key, value] of Object.entries(expected)) {
            if (!value) {
              throw new Error(`Missing expected env value for ${key}`)
            }
            if (adMob[key] !== value) {
              throw new Error(`Expected extra.adMob.${key}=${value}, got ${String(adMob[key])}`)
            }
            if (SAMPLE_IDS.includes(value) || SAMPLE_IDS.includes(adMob[key])) {
              throw new Error(`Detected Google sample AdMob ID for ${key}`)
            }
          }

          console.log('Expo AdMob config validation passed.')
          NODE

      - name: Generate Android project with Expo prebuild
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EAS_BUILD_PROFILE: production
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: "false"
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ env.PROD_ADMOB_ANDROID_APP_ID }}
          EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_ID: ${{ env.PROD_ADMOB_ANDROID_INTERSTITIAL_ID }}
          EXPO_PUBLIC_ADMOB_ANDROID_REWARDED_ID: ${{ env.PROD_ADMOB_ANDROID_REWARDED_ID }}
        run: |
          set -euo pipefail

          npx expo prebuild --platform android --no-install

      - name: Validate generated Android project does not contain sample AdMob IDs
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          PROD_ADMOB_ANDROID_APP_ID: ${{ env.PROD_ADMOB_ANDROID_APP_ID }}
        run: |
          set -euo pipefail

          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "${MANIFEST_PATH}" ]; then
            echo "Android manifest not found at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          if ! grep -F -q "${PROD_ADMOB_ANDROID_APP_ID}" "${MANIFEST_PATH}"; then
            echo "Android manifest does not contain the expected production AdMob app ID." >&2
            exit 1
          fi

          SAMPLE_IDS=(
            "ca-app-pub-3940256099942544~3347511713"
            "ca-app-pub-3940256099942544/1033173712"
            "ca-app-pub-3940256099942544/5224354917"
          )

          for sample_id in "${SAMPLE_IDS[@]}"; do
            if grep -R -F -q "${sample_id}" android; then
              echo "Detected Google sample AdMob ID in generated Android project: ${sample_id}" >&2
              grep -R -F "${sample_id}" android >&2 || true
              exit 1
            fi
          done

          echo "Generated Android project AdMob validation passed."

      - name: Configure Android release signing
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node scripts/configure-android-release-signing.js

      - name: Build signed AAB with Gradle
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android
        shell: bash
        env:
          CLEAR_CACHE: ${{ inputs.clear_cache }}
        run: |
          set -euo pipefail

          if [ "${CLEAR_CACHE}" = "true" ]; then
            rm -rf "${HOME}/.gradle/caches"
            rm -rf .gradle
          fi

          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease

      - name: Verify Android widget is bundled in release manifest
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "${AAB_PATH}" ]; then
            echo "AAB not found at ${AAB_PATH}" >&2
            exit 1
          fi
          MANIFEST_CANDIDATES=(
            "app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
            "app/build/intermediates/bundle_manifest/release/processApplicationManifestReleaseForBundle/AndroidManifest.xml"
            "app/build/intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
            "app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          )
          for MANIFEST in "${MANIFEST_CANDIDATES[@]}"; do
            if [ -f "${MANIFEST}" ] && grep -q "OrbitWidgetProvider" "${MANIFEST}"; then
              echo "Widget receiver present in release manifest: ${MANIFEST}"
              exit 0
            fi
          done
          echo "OrbitWidgetProvider receiver is missing from the release manifest artifacts." >&2
          exit 1

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0

      - name: Submit build to Google Play
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_TRACK: ${{ inputs.track }}
        run: |
          set -euo pipefail

          npx eas-cli@latest submit \
            --platform android \
            --profile "${RELEASE_TRACK}" \
            --path android/app/build/outputs/bundle/release/app-release.aab \
            --non-interactive

      - name: Remove temporary Play service account key
        if: always()
        shell: bash
        run: rm -rf "${RELEASE_WORKDIR}"
