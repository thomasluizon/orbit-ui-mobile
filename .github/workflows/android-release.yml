name: Android Release

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: User-facing app version shown on Google Play
        required: true
        type: string
      android_version_code:
        description: Android versionCode for this upload
        required: true
        type: string
      track:
        description: Google Play release track
        required: true
        type: choice
        options:
          - internal
          - closed
          - open
          - production
      clear_cache:
        description: Clear Gradle cache before building
        required: false
        type: boolean
        default: false
      message:
        description: Optional build message shown in Expo
        required: false
        type: string

jobs:
  release-android:
    name: Build and publish Android app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate release secrets
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          REQUIRED_SECRETS=(
            "EXPO_TOKEN"
            "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            "GOOGLE_SERVICES_JSON"
            "ANDROID_KEYSTORE_BASE64"
            "ANDROID_KEYSTORE_PASSWORD"
            "ANDROID_KEY_ALIAS"
            "ANDROID_KEY_PASSWORD"
          )

          for secret_name in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Set Expo app version
        working-directory: apps/mobile
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
        run: |
          set -euo pipefail
          node scripts/set-app-version.js "${APP_VERSION}" "${ANDROID_VERSION_CODE}"

      - name: Write Firebase Google services config
        working-directory: apps/mobile
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Write Google Play service account key
        working-directory: apps/mobile
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > play-service-account.json
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Generate Android project with Expo prebuild
        working-directory: apps/mobile
        shell: bash
        env:
          EXPO_NO_TELEMETRY: "1"
        run: |
          set -euo pipefail

          npx expo prebuild --platform android --non-interactive --clean

      - name: Configure Android release signing
        working-directory: apps/mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node scripts/configure-android-release-signing.js

      - name: Build signed AAB with Gradle
        working-directory: apps/mobile/android
        shell: bash
        env:
          CLEAR_CACHE: ${{ inputs.clear_cache }}
        run: |
          set -euo pipefail

          if [ "${CLEAR_CACHE}" = "true" ]; then
            rm -rf "${HOME}/.gradle/caches"
            rm -rf .gradle
          fi

          chmod +x gradlew
          ./gradlew --no-daemon clean bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Submit build to Google Play
        working-directory: apps/mobile
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_TRACK: ${{ inputs.track }}
        run: |
          set -euo pipefail

          npx eas-cli@latest submit \
            --platform android \
            --profile "${RELEASE_TRACK}" \
            --path android/app/build/outputs/bundle/release/app-release.aab \
            --non-interactive \
            --wait

      - name: Remove temporary Play service account key
        if: always()
        working-directory: apps/mobile
        shell: bash
        run: rm -f play-service-account.json google-services.json android/app/upload-keystore.jks android/keystore.properties
