name: Android Release

# Carry the dispatch inputs in the run title so `gh run list` identifies every
# release without opening it: the default title is the workflow name, which
# makes a list of past runs indistinguishable from one another.
run-name: Android Release ${{ inputs.app_version }} (${{ inputs.android_version_code }}) to ${{ inputs.track }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: User-facing app version shown on Google Play
        required: true
        type: string
      android_version_code:
        description: Android versionCode for this upload
        required: true
        type: string
      track:
        description: Google Play release track
        required: true
        type: choice
        options:
          - internal
          - closed
          - open
          - production
      clear_cache:
        description: Clear Gradle cache before building
        required: false
        type: boolean
        default: false
      validate_expo_dependencies:
        description: Run Expo dependency compatibility check before building
        required: false
        type: boolean
        default: false
      message:
        description: Optional note recorded in this run's log and summary
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-android:
    name: Build and publish Android app
    runs-on: ubuntu-latest
    env:
      EAS_BUILD_PROFILE: production
      EXPO_PUBLIC_ADMOB_USE_TEST_IDS: "false"
      EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ca-app-pub-8521676951882691~5595921738
      EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_ID: ca-app-pub-8521676951882691/8083010939
      EXPO_PUBLIC_ADMOB_ANDROID_REWARDED_ID: ca-app-pub-8521676951882691/3704782221
      EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      # First step on purpose: every later step can fail, and when one does the
      # log must still say what was being shipped and how to reproduce it. Run
      # 29512207801 failed in an early guard and recorded nothing about the
      # version, track, or branch it was building.
      - name: Show release parameters
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
          RELEASE_TRACK: ${{ inputs.track }}
          CLEAR_CACHE: ${{ inputs.clear_cache }}
          VALIDATE_EXPO_DEPENDENCIES: ${{ inputs.validate_expo_dependencies }}
          BUILD_MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail

          # Re-dispatching needs the branch, but reproducing a specific red run
          # needs the commit: the branch will have moved on by then.
          echo "app version:    ${APP_VERSION}"
          echo "versionCode:    ${ANDROID_VERSION_CODE}"
          echo "track:          ${RELEASE_TRACK}"
          echo "branch:         ${GITHUB_REF_NAME}"
          echo "commit:         ${GITHUB_SHA}"
          echo "clear cache:    ${CLEAR_CACHE}"
          echo "expo dep check: ${VALIDATE_EXPO_DEPENDENCIES}"
          echo "message:        ${BUILD_MESSAGE:-<none>}"
          echo "triggered by:   ${GITHUB_ACTOR}"

          RERUN_COMMAND=$(printf 'gh workflow run android-release.yml --repo %s --ref %s -f app_version=%s -f android_version_code=%s -f track=%s -f clear_cache=%s -f validate_expo_dependencies=%s' \
            "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "${APP_VERSION}" "${ANDROID_VERSION_CODE}" \
            "${RELEASE_TRACK}" "${CLEAR_CACHE}" "${VALIDATE_EXPO_DEPENDENCIES}")
          if [ -n "${BUILD_MESSAGE}" ]; then
            RERUN_COMMAND="${RERUN_COMMAND} -f message=$(printf '%q' "${BUILD_MESSAGE}")"
          fi

          echo "re-run:         ${RERUN_COMMAND}"

          {
            echo "### Release parameters"
            echo
            echo "| Parameter | Value |"
            echo "| --- | --- |"
            echo "| App version | \`${APP_VERSION}\` |"
            echo "| versionCode | \`${ANDROID_VERSION_CODE}\` |"
            echo "| Track | \`${RELEASE_TRACK}\` |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Clear cache | \`${CLEAR_CACHE}\` |"
            echo "| Expo dep check | \`${VALIDATE_EXPO_DEPENDENCIES}\` |"
            echo "| Triggered by | \`${GITHUB_ACTOR}\` |"
            echo
            echo "Re-run this release with the same values:"
            echo
            echo '```bash'
            echo "${RERUN_COMMAND}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      # The isolated node_modules copy + Expo prebuild + a full Gradle release
      # bundle (with Sentry sourcemaps) overrun the ~14 GB free on ubuntu-latest,
      # crashing the runner with "No space left on device" mid-build:
      # https://github.com/thomasluizon/orbit-ui-mobile/actions/runs/29030329772
      # Reclaim the unused preinstalled toolchains, but keep the Android SDK this
      # build depends on (android: false).
      - name: Free disk space for the Android release build
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package.json
            packages/shared/package.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # setup-java's `cache: gradle` only cached downloaded dependencies. This caches
      # the Gradle build cache too, so unchanged tasks are restored instead of rerun
      # on a runner that starts empty every release. The two must not both run --
      # gradle/actions documents that its caching interferes with setup-java's, so
      # `cache: gradle` above is deliberately gone rather than kept alongside:
      # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md
      - name: Set up Gradle with dependency and build caching
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: false

      # SENTRY_AUTH_TOKEN belongs here with the rest: the Sentry sourcemap upload
      # runs inside the Gradle bundle task, so a missing token surfaced ~15 minutes
      # into the build instead of in this one-second guard.
      - name: Validate release secrets
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          REQUIRED_SECRETS=(
            "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            "GOOGLE_SERVICES_JSON"
            "ANDROID_KEYSTORE_BASE64"
            "ANDROID_KEYSTORE_PASSWORD"
            "ANDROID_KEY_ALIAS"
            "ANDROID_KEY_PASSWORD"
            "SENTRY_AUTH_TOKEN"
          )

          for secret_name in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      # Google Play's API track names differ from this workflow's user-facing track
      # input: "closed" testing is the alpha track and "open" testing is the beta
      # track. eas.json's submit profiles held that mapping; keep it in one explicit
      # place now that the upload talks to the Play Developer API directly. Resolved
      # here rather than next to the upload so an unmappable track fails in seconds
      # instead of after the ~15 minute Gradle build.
      - name: Resolve Google Play track
        shell: bash
        env:
          RELEASE_TRACK: ${{ inputs.track }}
        run: |
          set -euo pipefail

          case "${RELEASE_TRACK}" in
            internal) play_track="internal" ;;
            closed) play_track="alpha" ;;
            open) play_track="beta" ;;
            production) play_track="production" ;;
            *)
              echo "::error::Unknown release track: ${RELEASE_TRACK}"
              exit 1
              ;;
          esac

          echo "PLAY_TRACK=${play_track}" >> "${GITHUB_ENV}"
          echo "Release track ${RELEASE_TRACK} uploads to the Google Play ${play_track} track."

      # The release used to copy apps/mobile into an isolated workspace and install
      # there with --package-lock=false, which resolved every dependency fresh from
      # the registry at release time. That shipped an AAB built from a tree no local
      # install or CI job ever had: 13 of 57 native modules and 87 JS packages
      # resolved to versions the lockfile does not hold, and one of them (@expo/ui
      # floating to 57.0.6 against expo-modules-core 57.0.3) failed R8 11 minutes
      # into run 29514193887.
      #
      # npm ci installs exactly the committed lockfile, so the release tree is the
      # tree the repo develops and tests against by construction -- no pins to
      # maintain and no drift guard to run. The isolated workspace only ever existed
      # to dodge npm hoisting; its stated blocker (@expo/cli crashing on the tsconfig
      # extends chain) does not reproduce here -- prebuild runs clean in place, which
      # is what scripts/android-release-apk.js has always done locally.
      - name: Install dependencies from the lockfile
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Validate Expo dependency compatibility
        if: ${{ inputs.validate_expo_dependencies }}
        working-directory: apps/mobile
        run: npx expo install --check

      - name: Set Expo app version
        working-directory: apps/mobile
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
        run: |
          set -euo pipefail
          node scripts/set-app-version.js "${APP_VERSION}" "${ANDROID_VERSION_CODE}"

      - name: Write Firebase Google services config
        working-directory: apps/mobile
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Resolve build target
        shell: bash
        env:
          PROD_API_BASE: https://api.useorbit.org
        run: |
          set -euo pipefail

          echo "BUILD_API_BASE=${PROD_API_BASE}" >> "${GITHUB_ENV}"
          echo "BUILD_ADMOB_USE_TEST_IDS=false" >> "${GITHUB_ENV}"
          echo "BUILD_EAS_PROFILE=production" >> "${GITHUB_ENV}"
          echo "Build target: PROD (api_base=${PROD_API_BASE}, real AdMob IDs)"

      # EXPO_NO_METRO_WORKSPACE_ROOT pins Metro's root to apps/mobile instead of the
      # monorepo root, matching what scripts/android-release-apk.js has always set for
      # the local build off this same tree.
      - name: Validate Expo config resolves production AdMob IDs
        working-directory: apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EXPO_NO_METRO_WORKSPACE_ROOT: "1"
        run: |
          set -euo pipefail

          npx expo config --type public --json > expo-public-config.json

          node scripts/assert-production-admob-config.js expo-public-config.json

      - name: Generate Android project with Expo prebuild
        working-directory: apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EXPO_NO_METRO_WORKSPACE_ROOT: "1"
          EAS_BUILD_PROFILE: ${{ env.BUILD_EAS_PROFILE }}
          EXPO_PUBLIC_API_BASE: ${{ env.BUILD_API_BASE }}
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: ${{ env.BUILD_ADMOB_USE_TEST_IDS }}
        run: |
          set -euo pipefail

          echo "Prebuild API base: ${EXPO_PUBLIC_API_BASE}"
          echo "Prebuild AdMob test IDs: ${EXPO_PUBLIC_ADMOB_USE_TEST_IDS}"

          npx expo prebuild --platform android --no-install

      - name: Validate generated Android project does not contain sample AdMob IDs
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "${MANIFEST_PATH}" ]; then
            echo "Android manifest not found at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          if ! grep -F -q "${EXPO_PUBLIC_ADMOB_ANDROID_APP_ID}" "${MANIFEST_PATH}"; then
            echo "Android manifest does not contain the expected production AdMob app ID." >&2
            exit 1
          fi

          SAMPLE_IDS=(
            "ca-app-pub-3940256099942544~3347511713"
            "ca-app-pub-3940256099942544/1033173712"
            "ca-app-pub-3940256099942544/5224354917"
          )

          for sample_id in "${SAMPLE_IDS[@]}"; do
            if grep -R -F -q "${sample_id}" android; then
              echo "Detected Google sample AdMob ID in generated Android project: ${sample_id}" >&2
              grep -R -F "${sample_id}" android >&2 || true
              exit 1
            fi
          done

          echo "Generated Android project AdMob validation passed."

      - name: Configure Android release signing
        working-directory: apps/mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node scripts/configure-android-release-signing.js

      # The C++ in worklets and reanimated is recompiled from scratch every release:
      # android/ is gitignored and regenerated by prebuild, so no native build output
      # survives to be reused. ccache keys on preprocessed source content instead,
      # which the pinned native module set (#545) makes stable across runs.
      # compiler_check=content is required on CI because ccache's default timestamp
      # check never hits on a runner that redownloads its toolchain every time:
      # https://reactnative.dev/docs/build-speed
      - name: Set up ccache for the native C++ builds
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y -qq ccache

          ccache --set-config=max_size=2G
          ccache --set-config=compiler_check=content
          ccache --zero-stats
          ccache --show-config | grep -E "max_size|compiler_check"

      # Keyed on the lockfile: a dependency change moves the native sources, and a
      # stale entry should be missed rather than reused. run_id keeps each run's cache
      # unique to write, with restore-keys falling back to the newest compatible one.
      - name: Restore the ccache directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-android-release-${{ hashFiles('package-lock.json') }}-${{ github.run_id }}
          restore-keys: |
            ccache-android-release-${{ hashFiles('package-lock.json') }}-
            ccache-android-release-

      # CMake initializes CMAKE_<LANG>_COMPILER_LAUNCHER from the environment variable
      # of the same name, so routing the NDK compiles through ccache needs no change to
      # the generated CMake files of every native module:
      # https://cmake.org/cmake/help/latest/variable/CMAKE_LANG_COMPILER_LAUNCHER.html
      - name: Build signed AAB with Gradle
        working-directory: apps/mobile/android
        shell: bash
        env:
          CLEAR_CACHE: ${{ inputs.clear_cache }}
          EXPO_NO_METRO_WORKSPACE_ROOT: "1"
          EAS_BUILD_PROFILE: ${{ env.BUILD_EAS_PROFILE }}
          EXPO_PUBLIC_API_BASE: ${{ env.BUILD_API_BASE }}
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: ${{ env.BUILD_ADMOB_USE_TEST_IDS }}
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          set -euo pipefail

          if [ "${CLEAR_CACHE}" = "true" ]; then
            rm -rf "${HOME}/.gradle/caches"
            rm -rf .gradle
            ccache --clear
          fi

          chmod +x gradlew
          ./gradlew --no-daemon --build-cache bundleRelease

          echo "ccache statistics for this build:"
          ccache --show-stats

      - name: Verify Android widget is bundled in release manifest
        working-directory: apps/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "${AAB_PATH}" ]; then
            echo "AAB not found at ${AAB_PATH}" >&2
            exit 1
          fi
          MANIFEST_CANDIDATES=(
            "app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
            "app/build/intermediates/bundle_manifest/release/processApplicationManifestReleaseForBundle/AndroidManifest.xml"
            "app/build/intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
            "app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          )
          for MANIFEST in "${MANIFEST_CANDIDATES[@]}"; do
            if [ -f "${MANIFEST}" ] && grep -q "OrbitWidgetProvider" "${MANIFEST}"; then
              echo "Widget receiver present in release manifest: ${MANIFEST}"
              exit 0
            fi
          done
          echo "OrbitWidgetProvider receiver is missing from the release manifest artifacts." >&2
          exit 1

      - name: Verify AD_ID permission is in release manifest
        working-directory: apps/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_CANDIDATES=(
            "app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
            "app/build/intermediates/bundle_manifest/release/processApplicationManifestReleaseForBundle/AndroidManifest.xml"
            "app/build/intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
            "app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          )
          for MANIFEST in "${MANIFEST_CANDIDATES[@]}"; do
            if [ -f "${MANIFEST}" ] && grep -q "com.google.android.gms.permission.AD_ID" "${MANIFEST}"; then
              echo "AD_ID permission present in release manifest: ${MANIFEST}"
              exit 0
            fi
          done
          echo "com.google.android.gms.permission.AD_ID is missing from the release manifest artifacts." >&2
          exit 1

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0

      # upload-google-play's validateTracks falls back to ['production'] when it
      # receives no track, so a PLAY_TRACK that failed to reach it -- a reordered or
      # skipped resolve step, a GITHUB_ENV that did not carry -- would publish to real
      # users instead of failing. Refuse to upload rather than let that default stand.
      - name: Assert the Google Play track resolved
        shell: bash
        env:
          RESOLVED_PLAY_TRACK: ${{ env.PLAY_TRACK }}
        run: |
          set -euo pipefail

          if [ -z "${RESOLVED_PLAY_TRACK}" ]; then
            echo "::error::PLAY_TRACK is empty. upload-google-play defaults to the production track when no track is supplied, so this would publish to production."
            exit 1
          fi

          echo "Uploading to the Google Play ${RESOLVED_PLAY_TRACK} track."

      # Uploads straight to the Play Developer API. eas-cli submit routed the AAB
      # through Expo's GCS bucket and sent the Play service account key to Expo's
      # backend to make this same androidpublisher call, which put a third party and
      # an Expo account (EXPO_TOKEN) on the release path for no capability gained.
      # Pinned to the v1.1.5 commit: this step handles the Play signing credential,
      # and a floating tag would let an upstream retag change what runs here.
      - name: Submit build to Google Play
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.useorbit.app
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ env.PLAY_TRACK }}
          status: completed
          mappingFile: apps/mobile/android/app/build/outputs/mapping/release/mapping.txt

      # The build materializes the Firebase config, the decoded upload keystore and
      # the keystore passwords into the checkout, so they are removed whatever the
      # outcome rather than left for a later step to pick up.
      - name: Remove the release secrets from the checkout
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          rm -f apps/mobile/google-services.json
          rm -f apps/mobile/expo-public-config.json
          rm -f apps/mobile/android/keystore.properties
          rm -f apps/mobile/android/app/upload-keystore.jks
