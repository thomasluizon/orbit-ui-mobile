name: Android Release

# Carry the dispatch inputs in the run title so `gh run list` identifies every
# release without opening it: the default title is the workflow name, which
# makes a list of past runs indistinguishable from one another.
run-name: Android Release ${{ inputs.app_version }} (${{ inputs.android_version_code }}) to ${{ inputs.track }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: User-facing app version shown on Google Play
        required: true
        type: string
      android_version_code:
        description: Android versionCode for this upload
        required: true
        type: string
      track:
        description: Google Play release track
        required: true
        type: choice
        options:
          - internal
          - closed
          - open
          - production
      clear_cache:
        description: Clear Gradle cache before building
        required: false
        type: boolean
        default: false
      validate_expo_dependencies:
        description: Run Expo dependency compatibility check before building
        required: false
        type: boolean
        default: false
      message:
        description: Optional build message shown in Expo
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-android:
    name: Build and publish Android app
    runs-on: ubuntu-latest
    env:
      RELEASE_WORKDIR: ${{ github.workspace }}/.release-mobile
      EAS_BUILD_PROFILE: production
      EXPO_PUBLIC_ADMOB_USE_TEST_IDS: "false"
      EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ca-app-pub-8521676951882691~5595921738
      EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_ID: ca-app-pub-8521676951882691/8083010939
      EXPO_PUBLIC_ADMOB_ANDROID_REWARDED_ID: ca-app-pub-8521676951882691/3704782221
      EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      # First step on purpose: every later step can fail, and when one does the
      # log must still say what was being shipped and how to reproduce it. Run
      # 29512207801 failed in an early guard and recorded nothing about the
      # version, track, or branch it was building.
      - name: Show release parameters
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
          RELEASE_TRACK: ${{ inputs.track }}
          CLEAR_CACHE: ${{ inputs.clear_cache }}
          VALIDATE_EXPO_DEPENDENCIES: ${{ inputs.validate_expo_dependencies }}
          BUILD_MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail

          # Re-dispatching needs the branch, but reproducing a specific red run
          # needs the commit: the branch will have moved on by then.
          echo "app version:    ${APP_VERSION}"
          echo "versionCode:    ${ANDROID_VERSION_CODE}"
          echo "track:          ${RELEASE_TRACK}"
          echo "branch:         ${GITHUB_REF_NAME}"
          echo "commit:         ${GITHUB_SHA}"
          echo "clear cache:    ${CLEAR_CACHE}"
          echo "expo dep check: ${VALIDATE_EXPO_DEPENDENCIES}"
          echo "message:        ${BUILD_MESSAGE:-<none>}"
          echo "triggered by:   ${GITHUB_ACTOR}"

          RERUN_COMMAND=$(printf 'gh workflow run android-release.yml --repo %s --ref %s -f app_version=%s -f android_version_code=%s -f track=%s -f clear_cache=%s -f validate_expo_dependencies=%s' \
            "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "${APP_VERSION}" "${ANDROID_VERSION_CODE}" \
            "${RELEASE_TRACK}" "${CLEAR_CACHE}" "${VALIDATE_EXPO_DEPENDENCIES}")
          if [ -n "${BUILD_MESSAGE}" ]; then
            RERUN_COMMAND="${RERUN_COMMAND} -f message=$(printf '%q' "${BUILD_MESSAGE}")"
          fi

          echo "re-run:         ${RERUN_COMMAND}"

          {
            echo "### Release parameters"
            echo
            echo "| Parameter | Value |"
            echo "| --- | --- |"
            echo "| App version | \`${APP_VERSION}\` |"
            echo "| versionCode | \`${ANDROID_VERSION_CODE}\` |"
            echo "| Track | \`${RELEASE_TRACK}\` |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Clear cache | \`${CLEAR_CACHE}\` |"
            echo "| Expo dep check | \`${VALIDATE_EXPO_DEPENDENCIES}\` |"
            echo "| Triggered by | \`${GITHUB_ACTOR}\` |"
            echo
            echo "Re-run this release with the same values:"
            echo
            echo '```bash'
            echo "${RERUN_COMMAND}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      # The isolated node_modules copy + Expo prebuild + a full Gradle release
      # bundle (with Sentry sourcemaps) overrun the ~14 GB free on ubuntu-latest,
      # crashing the runner with "No space left on device" mid-build:
      # https://github.com/thomasluizon/orbit-ui-mobile/actions/runs/29030329772
      # Reclaim the unused preinstalled toolchains, but keep the Android SDK this
      # build depends on (android: false).
      - name: Free disk space for the Android release build
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package.json
            packages/shared/package.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate release secrets
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          REQUIRED_SECRETS=(
            "EXPO_TOKEN"
            "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            "GOOGLE_SERVICES_JSON"
            "ANDROID_KEYSTORE_BASE64"
            "ANDROID_KEYSTORE_PASSWORD"
            "ANDROID_KEY_ALIAS"
            "ANDROID_KEY_PASSWORD"
          )

          for secret_name in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Prepare isolated mobile release workspace
        shell: bash
        run: |
          set -euo pipefail
          node apps/mobile/scripts/prepare-release-workspace.js "${RELEASE_WORKDIR}"

      # The isolated workspace is a copy of apps/mobile only, so the repo-root
      # .npmrc (legacy-peer-deps=true) does not apply here. Pass the flag
      # explicitly: worklets 0.10.0 is the ABI pair for reanimated 4.5.0 and must
      # not be "fixed" to a newer patch to satisfy an advisory peer range.
      - name: Install isolated mobile dependencies
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        run: npm install --package-lock=false --prefer-offline --no-audit --fund=false --legacy-peer-deps

      # The isolated workspace installs without a lockfile, so every native module
      # whose range is not exactly pinned floats to whatever is newest at build
      # time and the AAB ships native code no local install or CI job ever built.
      # That drift broke this release when @expo/ui floated to 57.0.6, which calls
      # expo.modules.kotlin.types.ColorCompat (added in expo-modules-core 57.0.4)
      # while expo-modules-core is pinned at 57.0.3, failing R8 11 minutes in:
      # https://github.com/thomasluizon/orbit-ui-mobile/actions/runs/29514193887
      # The root lockfile is the verified set, so assert the release tree matches
      # it rather than hand-maintaining a list of modules to watch.
      - name: Guard release native modules match the repo-root lockfile
        shell: bash
        run: |
          set -euo pipefail
          node apps/mobile/scripts/verify-release-native-modules.js \
            "${GITHUB_WORKSPACE}" "${RELEASE_WORKDIR}/apps/mobile"

      - name: Validate Expo dependency compatibility
        if: ${{ inputs.validate_expo_dependencies }}
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        run: npx expo install --check

      - name: Set Expo app version
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
        run: |
          set -euo pipefail
          node scripts/set-app-version.js "${APP_VERSION}" "${ANDROID_VERSION_CODE}"

      - name: Write Firebase Google services config
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Write Google Play service account key
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          cat <<'EOF' > play-service-account.json
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Resolve build target
        shell: bash
        env:
          PROD_API_BASE: https://api.useorbit.org
        run: |
          set -euo pipefail

          echo "BUILD_API_BASE=${PROD_API_BASE}" >> "${GITHUB_ENV}"
          echo "BUILD_ADMOB_USE_TEST_IDS=false" >> "${GITHUB_ENV}"
          echo "BUILD_EAS_PROFILE=production" >> "${GITHUB_ENV}"
          echo "Build target: PROD (api_base=${PROD_API_BASE}, real AdMob IDs)"

      - name: Validate Expo config resolves production AdMob IDs
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
        run: |
          set -euo pipefail

          npx expo config --type public --json > expo-public-config.json

          node scripts/assert-production-admob-config.js expo-public-config.json

      - name: Generate Android project with Expo prebuild
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EAS_BUILD_PROFILE: ${{ env.BUILD_EAS_PROFILE }}
          EXPO_PUBLIC_API_BASE: ${{ env.BUILD_API_BASE }}
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: ${{ env.BUILD_ADMOB_USE_TEST_IDS }}
        run: |
          set -euo pipefail

          echo "Prebuild API base: ${EXPO_PUBLIC_API_BASE}"
          echo "Prebuild AdMob test IDs: ${EXPO_PUBLIC_ADMOB_USE_TEST_IDS}"

          npx expo prebuild --platform android --no-install

      - name: Validate generated Android project does not contain sample AdMob IDs
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ ! -f "${MANIFEST_PATH}" ]; then
            echo "Android manifest not found at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          if ! grep -F -q "${EXPO_PUBLIC_ADMOB_ANDROID_APP_ID}" "${MANIFEST_PATH}"; then
            echo "Android manifest does not contain the expected production AdMob app ID." >&2
            exit 1
          fi

          SAMPLE_IDS=(
            "ca-app-pub-3940256099942544~3347511713"
            "ca-app-pub-3940256099942544/1033173712"
            "ca-app-pub-3940256099942544/5224354917"
          )

          for sample_id in "${SAMPLE_IDS[@]}"; do
            if grep -R -F -q "${sample_id}" android; then
              echo "Detected Google sample AdMob ID in generated Android project: ${sample_id}" >&2
              grep -R -F "${sample_id}" android >&2 || true
              exit 1
            fi
          done

          echo "Generated Android project AdMob validation passed."

      - name: Configure Android release signing
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          node scripts/configure-android-release-signing.js

      - name: Build signed AAB with Gradle
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android
        shell: bash
        env:
          CLEAR_CACHE: ${{ inputs.clear_cache }}
          EAS_BUILD_PROFILE: ${{ env.BUILD_EAS_PROFILE }}
          EXPO_PUBLIC_API_BASE: ${{ env.BUILD_API_BASE }}
          EXPO_PUBLIC_ADMOB_USE_TEST_IDS: ${{ env.BUILD_ADMOB_USE_TEST_IDS }}
        run: |
          set -euo pipefail

          if [ "${CLEAR_CACHE}" = "true" ]; then
            rm -rf "${HOME}/.gradle/caches"
            rm -rf .gradle
          fi

          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease

      - name: Verify Android widget is bundled in release manifest
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "${AAB_PATH}" ]; then
            echo "AAB not found at ${AAB_PATH}" >&2
            exit 1
          fi
          MANIFEST_CANDIDATES=(
            "app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
            "app/build/intermediates/bundle_manifest/release/processApplicationManifestReleaseForBundle/AndroidManifest.xml"
            "app/build/intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
            "app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          )
          for MANIFEST in "${MANIFEST_CANDIDATES[@]}"; do
            if [ -f "${MANIFEST}" ] && grep -q "OrbitWidgetProvider" "${MANIFEST}"; then
              echo "Widget receiver present in release manifest: ${MANIFEST}"
              exit 0
            fi
          done
          echo "OrbitWidgetProvider receiver is missing from the release manifest artifacts." >&2
          exit 1

      - name: Verify AD_ID permission is in release manifest
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_CANDIDATES=(
            "app/build/intermediates/packaged_manifests/release/processReleaseManifestForPackage/AndroidManifest.xml"
            "app/build/intermediates/bundle_manifest/release/processApplicationManifestReleaseForBundle/AndroidManifest.xml"
            "app/build/intermediates/merged_manifest/release/processReleaseMainManifest/AndroidManifest.xml"
            "app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          )
          for MANIFEST in "${MANIFEST_CANDIDATES[@]}"; do
            if [ -f "${MANIFEST}" ] && grep -q "com.google.android.gms.permission.AD_ID" "${MANIFEST}"; then
              echo "AD_ID permission present in release manifest: ${MANIFEST}"
              exit 0
            fi
          done
          echo "com.google.android.gms.permission.AD_ID is missing from the release manifest artifacts." >&2
          exit 1

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: ${{ env.RELEASE_WORKDIR }}/apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0

      - name: Submit build to Google Play
        working-directory: ${{ env.RELEASE_WORKDIR }}/apps/mobile
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_TRACK: ${{ inputs.track }}
        run: |
          set -euo pipefail

          npx eas-cli@latest submit \
            --platform android \
            --profile "${RELEASE_TRACK}" \
            --path android/app/build/outputs/bundle/release/app-release.aab \
            --non-interactive

      - name: Remove temporary Play service account key
        if: always()
        shell: bash
        run: rm -rf "${RELEASE_WORKDIR}"
